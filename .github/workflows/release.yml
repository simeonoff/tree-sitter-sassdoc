name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: so
          - os: macos-13
            target: x86_64-apple-darwin
            ext: so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Build dynamic library
        run: npx tree-sitter build --output sassdoc.${{ matrix.ext }}

      - name: Rename artifact
        run: mv sassdoc.${{ matrix.ext }} sassdoc-${{ matrix.target }}.${{ matrix.ext }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sassdoc-${{ matrix.target }}
          path: sassdoc-${{ matrix.target }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
